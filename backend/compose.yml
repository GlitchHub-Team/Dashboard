services:

  cloud-db:
    image: postgres:18.3

    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=cloud_db
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "5432:5432"


  adminer:
    image: adminer
    restart: always
    environment:
      - ADMINER_DEFAULT_SERVER=cloud-db
    ports:
      - "6767:8080"
    depends_on:
      - cloud-db

volumes:
  pgdata: