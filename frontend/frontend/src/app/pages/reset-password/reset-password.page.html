<div class="reset-container">
  <h1>Reimposta Password</h1>

  <app-reset-password-form
    [loading]="loading()"
    [generalError]="generalError()"
    [success]="passwordChangeResult() === true"
    (submitReset)="onSubmitReset($event)"
    (goToLogin)="onGoToLogin()"
    (dismissError)="onDismissError()"
  />
</div>
