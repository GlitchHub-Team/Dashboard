@if (loading()) {
  <mat-spinner diameter="32"></mat-spinner>
} @else if (users().length === 0) {
  <div class="empty-state">
    <mat-icon>group</mat-icon>
    <p>Nessun utente disponibile</p>
  </div>
} @else {
  <mat-table [dataSource]="users()" class="user-table">
    <ng-container matColumnDef="username">
      <mat-header-cell *matHeaderCellDef>Username</mat-header-cell>
      <mat-cell *matCellDef="let user">{{ user.username }}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="email">
      <mat-header-cell *matHeaderCellDef>Email</mat-header-cell>
      <mat-cell *matCellDef="let user">{{ user.email }}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="tenantId">
      <mat-header-cell *matHeaderCellDef>Tenant ID</mat-header-cell>
      <mat-cell *matCellDef="let user">{{ user.tenantId }}</mat-cell>
    </ng-container>

    <ng-container matColumnDef="actions">
      <mat-header-cell *matHeaderCellDef class="actions-header">Azioni</mat-header-cell>
      <mat-cell *matCellDef="let user" class="actions-cell">
        <button
          mat-icon-button
          (click)="onDelete(user); $event.stopPropagation()"
          matTooltip="Elimina"
          color="warn"
          [disabled]="loading()"
        >
          <mat-icon>delete</mat-icon>
        </button>
      </mat-cell>
    </ng-container>

    <mat-header-row *matHeaderRowDef="displayedColumns()"></mat-header-row>
    <mat-row *matRowDef="let row; columns: displayedColumns()"></mat-row>
  </mat-table>

  <mat-paginator
    [length]="total()"
    [pageIndex]="pageIndex()"
    [pageSize]="limit()"
    [pageSizeOptions]="[5, 10, 25]"
    (page)="onPageChange($event)"
    showFirstLastButtons
  />
}
