<div class="manager-container">
  <div class="manager-header">
    <h1>{{ context.title }}</h1>
    <button mat-raised-button color="primary" (click)="onCreateUser()" [disabled]="loading()">
      + Aggiungi Utente
    </button>
  </div>

  <div class="manager-content">
    <app-user-table
      [users]="users()"
      [loading]="loading()"
      [columnConfig]="columnConfig"
      (deleteRequested)="onDeleteUser($event)">
    </app-user-table>

    <mat-paginator
      [length]="total()"
      [pageSize]="limit()"
      [pageIndex]="pageIndex()"
      [pageSizeOptions]="[5, 10, 25, 100]"
      (page)="onPageChange($event)"
      aria-label="Seleziona pagina">
    </mat-paginator>
  </div>
</div>
