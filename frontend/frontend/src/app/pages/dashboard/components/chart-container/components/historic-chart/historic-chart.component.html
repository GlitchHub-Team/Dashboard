@if (hasMultipleFields()) {
  <mat-form-field appearance="outline">
    <mat-label>Stai visualizzando</mat-label>
    <mat-select
      [value]="selectedField()"
      (selectionChange)="onFieldChange($event.value)">
      @for (field of fields(); track field.key) {
        <mat-option [value]="field.key">
          {{ field.label }} ({{ field.unit }})
        </mat-option>
      }
    </mat-select>
  </mat-form-field>
}

<canvas
  baseChart
  type="line"
  [data]="chartData()"
  [options]="chartOptions()">
</canvas>

@if (canScroll()) {
  <div class="scroll-controls">
    <button mat-icon-button (click)="onScrollLeft()">
      <mat-icon>chevron_left</mat-icon>
    </button>

    <mat-slider [min]="0" [max]="maxOffset()" [step]="scrollStep()" discrete>
      <input
        matSliderThumb
        [value]="offset()"
        (valueChange)="onOffsetChange($event)" />
    </mat-slider>

    <button mat-icon-button (click)="onScrollRight()">
      <mat-icon>chevron_right</mat-icon>
    </button>
  </div>
}
