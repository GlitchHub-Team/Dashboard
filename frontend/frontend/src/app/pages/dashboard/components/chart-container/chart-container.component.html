@if (chartRequest()) {
  <mat-card>
    <mat-card-header>
      <mat-card-title>
        {{ chartRequest()!.sensor.name }} — {{ profileDisplay()?.label }}
      </mat-card-title>
      <div class="chart-actions">
        @if (isLiveChart()) {
          <span class="connection-status" [class]="statusClass()">
            {{ statusLabel() }}
          </span>
        }
        <button mat-icon-button (click)="onClose()">
          <mat-icon>close</mat-icon>
        </button>
      </div>
    </mat-card-header>

    <mat-card-content>
      @if (error()) {
        <div class="chart-error">{{ error() }}</div>
      } @else if (loading()) {
        <mat-spinner diameter="40" />
      } @else {
        @if (isHistoricChart()) {
          <app-historic-chart [readings]="historicReadings()" [sensor]="chartRequest()!.sensor" />
        } @else {
          <app-real-time-chart [readings]="liveReadings()" [sensor]="chartRequest()!.sensor" />
        }
      }
    </mat-card-content>
  </mat-card>
} @else {
  <div class="chart-placeholder">Nessun grafico selezionato</div>
}
