@if (hasMultipleFields()) {
  <mat-form-field appearance="outline" class="field-selector">
    <mat-label>Stai visualizzando</mat-label>
    <mat-select [value]="selectedField()" (selectionChange)="onFieldChange($event.value)">
      @for (field of fields(); track field.key) {
        <mat-option [value]="field.key"> {{ field.label }} ({{ field.unit }}) </mat-option>
      }
    </mat-select>
  </mat-form-field>
}

<canvas baseChart type="line" [data]="chartData()" [options]="chartOptions()"> </canvas>
