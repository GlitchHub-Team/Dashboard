<div class="dashboard-layout">
  <div class="dashboard-left">
    @if (error()) {
      <div class="error-banner">
        <mat-icon>error</mat-icon>
        <span>{{ error() }}</span>
      </div>
    }
    @if (canSendCommands()) {
      <app-dashboard-gateway-table
        [gateways]="gatewayList()"
        [sensors]="sensorList()"
        [expandedGateway]="expandedGateway()"
        [canSendCommands]="canSendCommands()"
        [gatewayLoading]="gatewayLoading()"
        [sensorLoading]="sensorLoading()"
        [gatewayTotal]="gatewayTotal()"
        [gatewayPageIndex]="gatewayPageIndex()"
        [gatewayLimit]="gatewayLimit()"
        [sensorTotal]="sensorTotal()"
        [sensorPageIndex]="sensorPageIndex()"
        [sensorLimit]="sensorLimit()"
        (commandRequested)="onCommandRequested($event)"
        (chartRequested)="onChartOpen($event)"
        (expandedGatewayChange)="onExpandedGatewayChange($event)"
        (gatewayPageChange)="onGatewayPageChange($event)"
        (sensorPageChange)="onSensorPageChange($event)"
      >
      </app-dashboard-gateway-table>
    } @else {
      <app-dashboard-sensor-table
        [sensors]="sensorList()"
        [loading]="sensorLoading()"
        [total]="sensorTotal()"
        [pageIndex]="sensorPageIndex()"
        [limit]="sensorLimit()"
        (chartRequested)="onChartOpen($event)"
        (pageChange)="onSensorPageChange($event)"
      >
      </app-dashboard-sensor-table>
    }
  </div>

  <div class="dashboard-top-right">
    @if (selectedChart()) {
      <app-chart-container [chartRequest]="selectedChart()!" (chartClosed)="onChartClosed()">
      </app-chart-container>
    }
  </div>

  <div class="dashboard-bottom-right">
    <!-- Alert component -->
  </div>
</div>
