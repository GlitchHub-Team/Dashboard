<h2 mat-dialog-title>Aggiungi Nuovo Tenant</h2>
<mat-dialog-content>
  @if (generalError()) {
    <div class="error-banner">
      <mat-icon>error</mat-icon>
      <span>{{ generalError() }}</span>
    </div>
  }
  <form [formGroup]="tenantForm">
    <mat-form-field appearance="outline" class="w-100">
      <mat-label>Nome</mat-label>
      <input matInput formControlName="name" required />
      @if (tenantForm.get('name')?.hasError('required')) {
        <mat-error>Campo obbligatorio</mat-error>
      }
    </mat-form-field>
    <mat-checkbox formControlName="canImpersonate">Permetti Impersonificazione</mat-checkbox>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Annulla</button>
  <button
    mat-raised-button
    color="primary"
    (click)="onSave()"
    [disabled]="tenantForm.invalid || isSubmitting()"
  >
  @if (isSubmitting()) {
    <mat-spinner diameter="20" />
  } @else {
    Salva
  }
  </button>
</mat-dialog-actions>
