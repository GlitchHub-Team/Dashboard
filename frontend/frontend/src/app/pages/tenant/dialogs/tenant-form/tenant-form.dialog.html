<h2 mat-dialog-title>Aggiungi Tenant</h2>
<mat-dialog-content>
  <form [formGroup]="tenantForm">
    <mat-form-field appearance="outline" class="w-100">
      <mat-label>Nome</mat-label>
      <input matInput formControlName="name" required />
      @if (tenantForm.get('name')?.hasError('required')) {
        <mat-error>Nome obbligatorio</mat-error>
      }
    </mat-form-field>
    <mat-checkbox formControlName="canImpersonate">Allow Impersonation</mat-checkbox>
    @if (generalError) {
      <div class="error-text">
        {{ generalError }}
      </div>
    }
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Annulla</button>
  <button
    mat-raised-button
    color="primary"
    (click)="onSave()"
    [disabled]="tenantForm.invalid || isSubmitting"
  >
    Salva
  </button>
</mat-dialog-actions>
