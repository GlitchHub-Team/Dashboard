<div class="tenant-manager-container">
  <div class="header-section">
    <h1>Gestione Tenant</h1>
    <button mat-raised-button color="primary" (click)="onCreateTenant()">
      <mat-icon>add</mat-icon> Aggiungi Nuovo Tenant
    </button>
  </div>

  @if (visibleError(); as error) {
    <div class="error-banner">
      <mat-icon>error_outline</mat-icon>
      <span>{{ error }}</span>
      <button mat-icon-button type="button" (click)="dismissError()">
        <mat-icon>close</mat-icon>
      </button>
    </div>
  }

  <div class="user-content table-container">
    <app-tenant-table
      [tenants]="tenants()"
      [loading]="loading() || false"
      [total]="total()"
      [pageIndex]="pageIndex()"
      [limit]="limit()"
      (pageChange)="onPageChange($event)"
      (dashboardRequested)="onGoToDashboard($event)"
      (deleteRequested)="onDeleteTenant($event)"
      (tenantUserManagementRequested)="onGoToTenantUserManagement($event)"
    ></app-tenant-table>
  </div>
</div>
