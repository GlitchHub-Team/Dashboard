<div class="tenant-manager-container">
  <div class="header-section">
    <h1>Tenant Management</h1>
    <button mat-raised-button color="primary" (click)="onCreateTenant()">
      + Add Tenant
    </button>
  </div>

  <app-tenant-table
    [tenants]="(tenants$ | async) || []"
    [loading]="(loading$ | async) || false"
    (deleteRequested)="onDeleteTenant($event)"
  ></app-tenant-table>
</div>
