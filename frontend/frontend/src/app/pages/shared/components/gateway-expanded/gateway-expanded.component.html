<div class="expanded-content">
  <h2>Sensori del gateway {{ gateway().id }}</h2>

  <app-sensor-table
    [sensors]="sensors()"
    [loading]="loading()"
    [actionMode]="actionMode()"
    [total]="sensorTotal()"
    [pageIndex]="sensorPageIndex()"
    [limit]="sensorLimit()"
    (chartRequested)="chartRequested.emit($event)"
    (commandRequested)="commandRequested.emit($event)"
    (createRequested)="sensorCreateRequested.emit(gateway())"
    (deleteRequested)="sensorDeleteRequested.emit($event)"
    (pageChange)="sensorPageChange.emit($event)"
  >
  </app-sensor-table>
</div>
